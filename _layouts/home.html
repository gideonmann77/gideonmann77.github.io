<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title | default: "Gideon Mann" }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #fff; }
    .icon-link {
      text-decoration: none;
      color: #2c2c2c;
      font-size: 2.2rem;
      display: inline-block;
      position: absolute;
      cursor: pointer;
      will-change: transform;
    }
    .icon-link:hover { color: #555; }
  </style>
</head>
<body>

  <a id="icon-twitter" class="icon-link" href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener">
    <i class="bi bi-twitter"></i>
  </a>
  <a id="icon-github" class="icon-link" href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">
    <i class="bi bi-github"></i>
  </a>
  <a id="icon-scholar" class="icon-link" href="{{ site.google_scholar }}" target="_blank" rel="noopener">
    <i class="bi bi-book"></i>
  </a>
  <a id="icon-linkedin" class="icon-link" href="{{ site.linkedin }}" target="_blank" rel="noopener">
    <i class="bi bi-linkedin"></i>
  </a>

<script>
(function() {
  'use strict';

  // =========================================================================
  // TUNABLE PARAMETERS — adjust these to change the feel
  // =========================================================================

  var GRAVITY       = 900;    // px/s² — how fast icons accelerate downward
  var OCEAN_Y       = 0.82;   // fraction of viewport height where ocean surface sits
  var DAMPING       = 0.3;    // velocity multiplier on water impact (0 = dead stop, 1 = full bounce)
  var SETTLE_SPEED  = 3.0;    // how quickly icons settle onto the wave surface (higher = faster)

  // Traveling wave components — each wave moves across the screen spatially.
  // All icons ride the SAME waves; their phase differs only by x-position.
  // freq: temporal frequency (cycles/sec), wavelength: spatial (px),
  // amp: vertical displacement (px), speed derived as freq * wavelength
  var WAVES = [
    { freq: 0.15,  wavelength: 800, amp: 12 },   // long slow swell
    { freq: 0.35,  wavelength: 400, amp: 6  },   // medium wave
    { freq: 0.65,  wavelength: 200, amp: 3  },   // short chop
    { freq: 1.1,   wavelength: 120, amp: 1.5 },  // fine ripple
  ];

  // Horizontal drift amplitude relative to vertical amplitude.
  // In real water, surface particles move in circles — horizontal motion
  // is roughly proportional to vertical motion.
  var DRIFT_RATIO = 5.0;  // px horizontal per px vertical amplitude

  var ICON_MARGIN = 32; // px — minimum distance from screen edge
  var ICON_SIZE   = 36; // px — effective icon diameter for collision
  var COLLISION_BOUNCE = 0.5; // elasticity of icon-to-icon collisions (0-1)
  var WAVE_FORCE  = 1.2;  // how strongly waves pull icons laterally (spring constant)
  var DRAG        = 2.0;  // water drag on horizontal movement (friction)

  // Rocking: icons tilt proportionally to the wave slope at their position
  var ROCK_SCALE  = 2.5;  // degrees per unit slope

  // Wave direction: waves travel in one direction for DIRECTION_PERIOD seconds,
  // then smoothly reverse over DIRECTION_TRANSITION seconds.
  var DIRECTION_PERIOD     = 30;  // seconds per direction
  var DIRECTION_TRANSITION = 3;   // seconds to smoothly blend between directions

  // Icon horizontal spacing
  var ICON_GAP = 140; // px between icon centers

  // =========================================================================
  // SIMULATION
  // =========================================================================

  var icons = [];
  var iconEls = [
    document.getElementById('icon-twitter'),
    document.getElementById('icon-github'),
    document.getElementById('icon-scholar'),
    document.getElementById('icon-linkedin'),
  ];

  function initIcons() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var totalWidth = (iconEls.length - 1) * ICON_GAP;
    var startX = (vw - totalWidth) / 2;
    var startY = vh * 0.45; // start near vertical center

    icons = iconEls.map(function(el, i) {
      var bx = startX + i * ICON_GAP;
      return {
        el: el,
        baseX: bx,
        x: bx,
        y: startY,
        vx: 0,
        vy: 0,
        floating: false,
        settled: false,
      };
    });
  }

  // All wave functions take (t, x) — same wave field sampled at different positions.
  // phase = 2π * (freq * t - dir * x / wavelength)
  // dir = +1 → wave moves right, dir = -1 → wave moves left

  // Returns wave direction as a smooth value between -1 and +1.
  // Holds at ±1 for DIRECTION_PERIOD, transitions over DIRECTION_TRANSITION.
  function waveDir(t) {
    var cycle = 2 * DIRECTION_PERIOD + 2 * DIRECTION_TRANSITION;
    var phase = t % cycle;
    // 0 → period: moving right (+1)
    // period → period+trans: transitioning to left
    // period+trans → 2*period+trans: moving left (-1)
    // 2*period+trans → cycle: transitioning to right
    if (phase < DIRECTION_PERIOD) {
      return 1;
    } else if (phase < DIRECTION_PERIOD + DIRECTION_TRANSITION) {
      var p = (phase - DIRECTION_PERIOD) / DIRECTION_TRANSITION;
      return 1 - 2 * (0.5 - 0.5 * Math.cos(Math.PI * p)); // smooth cosine ease
    } else if (phase < 2 * DIRECTION_PERIOD + DIRECTION_TRANSITION) {
      return -1;
    } else {
      var p = (phase - 2 * DIRECTION_PERIOD - DIRECTION_TRANSITION) / DIRECTION_TRANSITION;
      return -1 + 2 * (0.5 - 0.5 * Math.cos(Math.PI * p));
    }
  }

  function waveY(t, x) {
    var dir = waveDir(t);
    var y = 0;
    for (var j = 0; j < WAVES.length; j++) {
      var w = WAVES[j];
      y += w.amp * Math.sin(2 * Math.PI * (w.freq * t - dir * x / w.wavelength));
    }
    return y;
  }

  function waveDriftX(t, x) {
    var dir = waveDir(t);
    var dx = 0;
    for (var j = 0; j < WAVES.length; j++) {
      var w = WAVES[j];
      dx += w.amp * DRIFT_RATIO * dir *
            Math.cos(2 * Math.PI * (w.freq * t - dir * x / w.wavelength));
    }
    return dx;
  }

  function waveSlope(t, x) {
    var dir = waveDir(t);
    var s = 0;
    for (var j = 0; j < WAVES.length; j++) {
      var w = WAVES[j];
      s += w.amp * (-2 * Math.PI * dir / w.wavelength) *
           Math.cos(2 * Math.PI * (w.freq * t - dir * x / w.wavelength));
    }
    return s;
  }

  var lastTime = null;

  function tick(timestamp) {
    if (lastTime === null) { lastTime = timestamp; }
    var dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap dt to avoid spiral
    lastTime = timestamp;

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var oceanSurface = vh * OCEAN_Y;
    var t = timestamp / 1000;

    // --- Update positions ---
    for (var i = 0; i < icons.length; i++) {
      var icon = icons[i];
      // Sample the wave field at this icon's current x position
      var targetWaveY = oceanSurface + waveY(t, icon.x);

      if (!icon.floating) {
        // Gravity phase — vertical only
        icon.vy += GRAVITY * dt;
        icon.y += icon.vy * dt;

        if (icon.y >= targetWaveY) {
          icon.y = targetWaveY;
          icon.vy *= -DAMPING;
          if (Math.abs(icon.vy) < 15) {
            icon.floating = true;
            icon.vy = 0;
          }
        }
      } else {
        // Floating phase — vertical follows wave at this x
        icon.y += (targetWaveY - icon.y) * SETTLE_SPEED * dt;
        if (Math.abs(targetWaveY - icon.y) < 0.5) {
          icon.y = targetWaveY;
          icon.settled = true;
        }

        // Horizontal: wave drift force at this x, plus spring back to base
        var targetX = icon.baseX + waveDriftX(t, icon.x);
        var force = (targetX - icon.x) * WAVE_FORCE;
        icon.vx += force * dt;

        // Water drag
        icon.vx -= icon.vx * DRAG * dt;

        icon.x += icon.vx * dt;
      }
    }

    // --- Resolve collisions between icons ---
    for (var i = 0; i < icons.length; i++) {
      for (var j = i + 1; j < icons.length; j++) {
        var a = icons[i], b = icons[j];
        var dx = b.x - a.x;
        var dy = b.y - a.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var minDist = ICON_SIZE;

        if (dist < minDist && dist > 0.01) {
          // Separate the icons
          var overlap = minDist - dist;
          var nx = dx / dist;
          var ny = dy / dist;
          a.x -= nx * overlap * 0.5;
          a.y -= ny * overlap * 0.5;
          b.x += nx * overlap * 0.5;
          b.y += ny * overlap * 0.5;

          // Exchange velocity along collision axis
          var dvx = a.vx - b.vx;
          var impulse = dvx * nx * COLLISION_BOUNCE;
          a.vx -= impulse * nx;
          b.vx += impulse * nx;
        }
      }
    }

    // --- Clamp to screen edges and render ---
    for (var i = 0; i < icons.length; i++) {
      var icon = icons[i];

      // Bounce off screen edges
      if (icon.x < ICON_MARGIN) {
        icon.x = ICON_MARGIN;
        icon.vx = Math.abs(icon.vx) * COLLISION_BOUNCE;
      } else if (icon.x > vw - ICON_MARGIN) {
        icon.x = vw - ICON_MARGIN;
        icon.vx = -Math.abs(icon.vx) * COLLISION_BOUNCE;
      }

      // Tilt follows the wave slope at this icon's position
      var rot = icon.floating ? waveSlope(t, icon.x) * ROCK_SCALE * (180 / Math.PI) : 0;

      icon.el.style.transform =
        'translate(' + (icon.x - 16) + 'px, ' + icon.y + 'px) rotate(' + rot + 'deg)';
    }

    requestAnimationFrame(tick);
  }

  initIcons();
  requestAnimationFrame(tick);

  // Re-center on resize
  window.addEventListener('resize', function() {
    var vw = window.innerWidth;
    var totalWidth = (iconEls.length - 1) * ICON_GAP;
    var startX = (vw - totalWidth) / 2;
    for (var i = 0; i < icons.length; i++) {
      icons[i].baseX = startX + i * ICON_GAP;
      icons[i].x = startX + i * ICON_GAP;
    }
  });
})();
</script>

</body>
</html>
