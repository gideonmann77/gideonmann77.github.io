<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title | default: "Gideon Mann" }}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #fff; }
    .icon-link {
      text-decoration: none;
      color: #2c2c2c;
      font-size: 2.2rem;
      display: inline-block;
      position: absolute;
      cursor: grab;
      will-change: transform;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .icon-link:hover { color: #555; }
    .icon-link.dragging { cursor: grabbing; }
  </style>
</head>
<body>

  <a id="icon-twitter" class="icon-link" href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener">
    <i class="bi bi-twitter"></i>
  </a>
  <a id="icon-github" class="icon-link" href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">
    <i class="bi bi-github"></i>
  </a>
  <a id="icon-scholar" class="icon-link" href="{{ site.google_scholar }}" target="_blank" rel="noopener">
    <i class="bi bi-book"></i>
  </a>
  <a id="icon-linkedin" class="icon-link" href="{{ site.linkedin }}" target="_blank" rel="noopener">
    <i class="bi bi-linkedin"></i>
  </a>

<script>
(function() {
  'use strict';

  // =========================================================================
  // TUNABLE PARAMETERS — adjust these to change the feel
  // =========================================================================

  // Gravity (used for drag-drop splash)
  var GRAVITY       = 900;    // px/s²
  var OCEAN_Y       = 0.82;   // fraction of viewport height where ocean surface sits
  var DAMPING       = 0.3;    // velocity multiplier on water impact (0 = dead stop, 1 = full bounce)
  var SETTLE_SPEED  = 3.0;    // how quickly icons settle onto the wave surface

  // Beach-realistic traveling wave components.
  // Mild day: waves every 5-12 seconds, gentle amplitude.
  // All icons ride the SAME wave field sampled at their x-position.
  var WAVES = [
    { freq: 0.08,   wavelength: 1200, amp: 12 },  // background swell (12.5s period)
    { freq: 0.125,  wavelength: 800,  amp: 20 },  // primary swell (8s period)
    { freq: 0.2,    wavelength: 500,  amp: 5  },  // light chop (5s period)
  ];

  // Wave sets — slow amplitude envelope so wave height varies over time,
  // like groups of larger waves arriving then calming down.
  var SET_FREQ   = 0.02;   // cycles/sec (~50s per full set cycle)
  var SET_DEPTH  = 0.4;    // min amplitude fraction (0.4 = varies 40%-100%)

  // Horizontal drift amplitude relative to vertical amplitude.
  var DRIFT_RATIO = 5.0;

  var ICON_MARGIN = 32;
  var ICON_SIZE   = 36;
  var COLLISION_BOUNCE = 0.5;
  var WAVE_FORCE  = 1.2;
  var DRAG        = 2.0;

  // Rocking: icons tilt proportionally to the wave slope
  var ROCK_SCALE  = 2.5;

  // Wave direction reversal
  var DIRECTION_PERIOD     = 30;
  var DIRECTION_TRANSITION = 3;

  // Icon horizontal spacing
  var ICON_GAP = 140;

  // Pause before waves begin, then ease in
  var WAVE_DELAY    = 0;
  var WAVE_FADE_IN  = 3.0;

  // Drag-and-drop
  var DRAG_THRESHOLD = 5; // px movement before it counts as drag (vs click)

  // =========================================================================
  // SIMULATION
  // =========================================================================

  var icons = [];
  var iconEls = [
    document.getElementById('icon-twitter'),
    document.getElementById('icon-github'),
    document.getElementById('icon-scholar'),
    document.getElementById('icon-linkedin'),
  ];

  function initIcons() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var totalWidth = (iconEls.length - 1) * ICON_GAP;
    var startX = (vw - totalWidth) / 2;
    var oceanSurface = vh * OCEAN_Y;

    icons = iconEls.map(function(el, i) {
      var bx = startX + i * ICON_GAP;
      return {
        el: el,
        baseX: bx,
        x: bx,
        y: oceanSurface,
        vx: 0,
        vy: 0,
        floating: true,
        settled: false,
        dragging: false,
      };
    });
  }

  // --- Wave functions ---

  // Wave set envelope: slow modulation of wave amplitude.
  // Uses -cos so it starts at the MINIMUM (calm) and builds up.
  function waveSetEnvelope(t) {
    var s = -Math.cos(2 * Math.PI * SET_FREQ * t);
    // Map [-1,1] to [SET_DEPTH, 1] — starts at SET_DEPTH (calm)
    return SET_DEPTH + (1 - SET_DEPTH) * (0.5 + 0.5 * s);
  }

  // Amplitude multiplier: delay + fade-in + wave sets
  function waveAmp(t) {
    if (t < WAVE_DELAY) return 0;
    var elapsed = t - WAVE_DELAY;
    var fadeIn = 1;
    if (elapsed < WAVE_FADE_IN) {
      fadeIn = 0.5 - 0.5 * Math.cos(Math.PI * elapsed / WAVE_FADE_IN);
    }
    return fadeIn * waveSetEnvelope(t);
  }

  // Wave direction: smooth reversal between +1 and -1
  function waveDir(t) {
    var cycle = 2 * DIRECTION_PERIOD + 2 * DIRECTION_TRANSITION;
    var phase = t % cycle;
    if (phase < DIRECTION_PERIOD) {
      return 1;
    } else if (phase < DIRECTION_PERIOD + DIRECTION_TRANSITION) {
      var p = (phase - DIRECTION_PERIOD) / DIRECTION_TRANSITION;
      return 1 - 2 * (0.5 - 0.5 * Math.cos(Math.PI * p));
    } else if (phase < 2 * DIRECTION_PERIOD + DIRECTION_TRANSITION) {
      return -1;
    } else {
      var p = (phase - 2 * DIRECTION_PERIOD - DIRECTION_TRANSITION) / DIRECTION_TRANSITION;
      return -1 + 2 * (0.5 - 0.5 * Math.cos(Math.PI * p));
    }
  }

  function waveY(t, x) {
    var a = waveAmp(t);
    if (a === 0) return 0;
    var dir = waveDir(t);
    var y = 0;
    for (var j = 0; j < WAVES.length; j++) {
      var w = WAVES[j];
      y += w.amp * Math.sin(2 * Math.PI * (w.freq * t - dir * x / w.wavelength));
    }
    return y * a;
  }

  function waveDriftX(t, x) {
    var a = waveAmp(t);
    if (a === 0) return 0;
    var dir = waveDir(t);
    var dx = 0;
    for (var j = 0; j < WAVES.length; j++) {
      var w = WAVES[j];
      dx += w.amp * DRIFT_RATIO * dir *
            Math.cos(2 * Math.PI * (w.freq * t - dir * x / w.wavelength));
    }
    return dx * a;
  }

  function waveSlope(t, x) {
    var a = waveAmp(t);
    if (a === 0) return 0;
    var dir = waveDir(t);
    var s = 0;
    for (var j = 0; j < WAVES.length; j++) {
      var w = WAVES[j];
      s += w.amp * (-2 * Math.PI * dir / w.wavelength) *
           Math.cos(2 * Math.PI * (w.freq * t - dir * x / w.wavelength));
    }
    return s * a;
  }

  // --- Drag and drop ---

  var dragIcon = null;
  var dragStartX = 0, dragStartY = 0;
  var dragMoved = false;

  function getPointerPos(e) {
    if (e.touches && e.touches.length > 0) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function onPointerDown(e) {
    // Find which icon was clicked
    var target = e.currentTarget;
    for (var i = 0; i < icons.length; i++) {
      if (icons[i].el === target) {
        dragIcon = icons[i];
        break;
      }
    }
    if (!dragIcon) return;

    var pos = getPointerPos(e);
    dragStartX = pos.x;
    dragStartY = pos.y;
    dragMoved = false;
    dragIcon.dragging = true;
    dragIcon.vx = 0;
    dragIcon.vy = 0;
    dragIcon.el.classList.add('dragging');

    e.preventDefault(); // prevent text selection and link navigation during drag
  }

  function onPointerMove(e) {
    if (!dragIcon) return;
    var pos = getPointerPos(e);
    var dx = pos.x - dragStartX;
    var dy = pos.y - dragStartY;

    if (!dragMoved && Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) {
      dragMoved = true;
    }

    if (dragMoved) {
      dragIcon.x = pos.x;
      dragIcon.y = pos.y;
    }
  }

  function onPointerUp(e) {
    if (!dragIcon) return;
    dragIcon.el.classList.remove('dragging');

    if (!dragMoved) {
      // It was a click, not a drag — navigate to the link
      dragIcon.dragging = false;
      var href = dragIcon.el.getAttribute('href');
      if (href) {
        window.open(href, '_blank', 'noopener');
      }
      dragIcon = null;
      return;
    }

    // Released after drag — drop with gravity from wherever it is now
    dragIcon.baseX = dragIcon.x;
    dragIcon.dragging = false;
    dragIcon.floating = false;
    dragIcon.settled = false;
    dragIcon.vy = 0;
    dragIcon = null;
  }

  // Attach listeners to each icon
  iconEls.forEach(function(el) {
    el.addEventListener('mousedown', onPointerDown);
    el.addEventListener('touchstart', onPointerDown, { passive: false });

    // Prevent default click so we handle navigation ourselves
    el.addEventListener('click', function(e) {
      e.preventDefault();
    });
  });

  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('touchmove', onPointerMove, { passive: false });
  document.addEventListener('mouseup', onPointerUp);
  document.addEventListener('touchend', onPointerUp);

  // --- Main loop ---

  var lastTime = null;

  function tick(timestamp) {
    if (lastTime === null) { lastTime = timestamp; }
    var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var oceanSurface = vh * OCEAN_Y;
    var t = timestamp / 1000;

    // --- Update positions ---
    for (var i = 0; i < icons.length; i++) {
      var icon = icons[i];

      // Skip physics for dragged icon
      if (icon.dragging) continue;

      var targetWaveY = oceanSurface + waveY(t, icon.x);

      if (!icon.floating) {
        // Gravity phase (drag-drop splash)
        icon.vy += GRAVITY * dt;
        icon.y += icon.vy * dt;

        if (icon.y >= targetWaveY) {
          icon.y = targetWaveY;
          icon.vy *= -DAMPING;
          if (Math.abs(icon.vy) < 15) {
            icon.floating = true;
            icon.vy = 0;
          }
        }
      } else {
        // Floating phase — vertical follows wave
        icon.y += (targetWaveY - icon.y) * SETTLE_SPEED * dt;
        if (Math.abs(targetWaveY - icon.y) < 0.5) {
          icon.y = targetWaveY;
          icon.settled = true;
        }

        // Horizontal: wave drift force + spring back to base
        var targetX = icon.baseX + waveDriftX(t, icon.x);
        var force = (targetX - icon.x) * WAVE_FORCE;
        icon.vx += force * dt;
        icon.vx -= icon.vx * DRAG * dt;
        icon.x += icon.vx * dt;
      }
    }

    // --- Resolve collisions ---
    for (var i = 0; i < icons.length; i++) {
      if (icons[i].dragging) continue;
      for (var j = i + 1; j < icons.length; j++) {
        if (icons[j].dragging) continue;
        var a = icons[i], b = icons[j];
        var dx = b.x - a.x;
        var dy = b.y - a.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var minDist = ICON_SIZE;

        if (dist < minDist && dist > 0.01) {
          var overlap = minDist - dist;
          var nx = dx / dist;
          var ny = dy / dist;
          a.x -= nx * overlap * 0.5;
          a.y -= ny * overlap * 0.5;
          b.x += nx * overlap * 0.5;
          b.y += ny * overlap * 0.5;

          var dvx = a.vx - b.vx;
          var impulse = dvx * nx * COLLISION_BOUNCE;
          a.vx -= impulse * nx;
          b.vx += impulse * nx;
        }
      }
    }

    // --- Clamp to screen edges and render ---
    for (var i = 0; i < icons.length; i++) {
      var icon = icons[i];

      if (!icon.dragging) {
        if (icon.x < ICON_MARGIN) {
          icon.x = ICON_MARGIN;
          icon.vx = Math.abs(icon.vx) * COLLISION_BOUNCE;
        } else if (icon.x > vw - ICON_MARGIN) {
          icon.x = vw - ICON_MARGIN;
          icon.vx = -Math.abs(icon.vx) * COLLISION_BOUNCE;
        }
      }

      var rot = icon.floating && !icon.dragging ? waveSlope(t, icon.x) * ROCK_SCALE * (180 / Math.PI) : 0;

      icon.el.style.transform =
        'translate(' + (icon.x - 16) + 'px, ' + icon.y + 'px) rotate(' + rot + 'deg)';
    }

    requestAnimationFrame(tick);
  }

  initIcons();
  requestAnimationFrame(tick);

  // Re-center on resize
  window.addEventListener('resize', function() {
    var vw = window.innerWidth;
    var totalWidth = (iconEls.length - 1) * ICON_GAP;
    var startX = (vw - totalWidth) / 2;
    for (var i = 0; i < icons.length; i++) {
      icons[i].baseX = startX + i * ICON_GAP;
      icons[i].x = startX + i * ICON_GAP;
    }
  });
})();
</script>

</body>
</html>
